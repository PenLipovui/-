<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-код со счётчиком переходов</title>
    
    <!-- Подключаем библиотеку для генерации QR-кода -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .content-wrapper {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .qr-section {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        
        #qrcode {
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        
        #qrcode img {
            display: block;
        }
        
        .stats-section {
            flex: 1;
            min-width: 150px;
        }
        
        .counter-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .count-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .count-number {
            font-size: 56px;
            font-weight: bold;
            color: #e74c3c;
            line-height: 1;
            transition: all 0.3s;
        }
        
        .count-number.animate {
            animation: pulse 0.5s ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        .info-box {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .info-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 13px;
            color: #764ba2;
            word-break: break-all;
        }
        
        .timestamp {
            font-size: 11px;
            color: #999;
            margin-top: 15px;
            text-align: center;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-refresh {
            background: #3498db;
            color: white;
        }
        
        .btn-refresh:hover {
            background: #2980b9;
        }
        
        .btn-download {
            background: #27ae60;
            color: white;
        }
        
        .btn-download:hover {
            background: #219a52;
        }
        
        .qr-url-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            word-break: break-all;
            text-align: center;
        }
        
        .status {
            font-size: 11px;
            margin-top: 5px;
            text-align: center;
        }
        
        .status.online {
            color: #27ae60;
        }
        
        .status.offline {
            color: #e74c3c;
        }
        
        .setup-note {
            background: #e8f4fd;
            border: 1px solid #3498db;
            color: #2980b9;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 QR-код каталога кухонь</h1>
        <p class="subtitle">Лемана ПРО • Общий счётчик</p>
        
        <div class="content-wrapper">
            <div class="qr-section">
                <div id="qrcode"></div>
                <div class="qr-url-display" id="qrUrlDisplay"></div>
            </div>
            
            <div class="stats-section">
                <div class="counter-box">
                    <div class="count-label">Сканирований QR:</div>
                    <div class="count-number" id="counter">0</div>
                </div>
                
                <div class="timestamp" id="timestamp">Загрузка...</div>
                <div class="status" id="status">Подключение...</div>
                
                <div class="buttons">
                    <button class="btn btn-refresh" onclick="loadCount()">
                        🔄 Обновить
                    </button>
                    <button class="btn btn-download" onclick="downloadQR()">
                        💾 Скачать QR
                    </button>
                </div>
            </div>
        </div>
        
        <div class="setup-note" id="setupNote">
            ⚠️ Настройте Google Apps Script (см. инструкцию)
        </div>
    </div>

    <script>
        // НАСТРОЙКИ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwgrEY_QGHf7IB7etR5AdDoIYBs0HvBtaDqOnNY_CZhKMM3Zaj9yjFk8F2Uc90mO4sFdA/exec'; // Вставьте сюда URL после настройки
        const targetUrl = "https://lemanapro.ru/catalogue/kuhonnye-garnitury/";
        
        // Получаем текущий URL для создания правильной ссылки на redirect.html
        function getRedirectUrl() {
            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
            return baseUrl + 'redirect.html';
        }
        
        // Загружаем счётчик из Google Sheets
        async function loadCount() {
            if (SCRIPT_URL === 'ВАШ_URL_СКРИПТА') {
                document.getElementById('counter').textContent = '?';
                document.getElementById('status').textContent = 'Скрипт не настроен';
                document.getElementById('status').className = 'status offline';
                return 0;
            }
            
            try {
                document.getElementById('status').textContent = 'Загрузка...';
                const response = await fetch(SCRIPT_URL + '?action=get');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('counter').textContent = data.count;
                    document.getElementById('timestamp').textContent = 
                        '🕐 Обновлено: ' + new Date().toLocaleString('ru-RU');
                    document.getElementById('status').textContent = '✓ Данные получены';
                    document.getElementById('status').className = 'status online';
                    document.getElementById('setupNote').style.display = 'none';
                    return data.count;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('status').textContent = '✗ Ошибка подключения';
                document.getElementById('status').className = 'status offline';
            }
            return 0;
        }
        
        // Генерация QR-кода
        function generateQR() {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = '';
            
            const redirectUrl = getRedirectUrl();
            
            // Показываем URL в QR
            document.getElementById('qrUrlDisplay').textContent = 
                'Ссылка в QR: ' + redirectUrl;
            
            new QRCode(qrContainer, {
                text: redirectUrl,
                width: 200,
                height: 200,
                colorDark: "#764ba2",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        // Скачивание QR-кода
        function downloadQR() {
            const qrImage = document.querySelector('#qrcode img');
            if (qrImage) {
                const link = document.createElement('a');
                link.download = 'qr-code-lemanapro-kuhni.png';
                link.href = qrImage.src;
                link.click();
            }
        }
        
        // Автообновление каждые 10 секунд
        function startAutoRefresh() {
            setInterval(loadCount, 10000);
        }
        
        // Инициализация
        window.addEventListener('DOMContentLoaded', () => {
            loadCount();
            generateQR();
            startAutoRefresh();
        });
    </script>
</body>
</html>
