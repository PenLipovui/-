<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .message {
            text-align: center;
            font-size: 18px;
            color: #333;
        }
    </style>
    
    <script>
        // НАСТРОЙКИ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRFe2OfgKhwVq6V-Xqcl_5PhCymhv-1uBvLBZ3jBNnq02i-iCG1K8otCMJJKcCL96nuA/exec'; // Вставьте сюда URL после настройки
        
        // Отправляем данные о переходе
        async function incrementCounter() {
            if (SCRIPT_URL === 'ВАШ_URL_СКРИПТА') {
                console.log('Скрипт не настроен');
                return;
            }
            
            try {
                await fetch(SCRIPT_URL + '?action=increment');
            } catch (error) {
                console.error('Ошибка счётчика:', error);
            }
        }
        
        // Выполняем при загрузке
        incrementCounter().then(() => {
            // Перенаправляем на целевой сайт
            window.location.href = "https://lemanapro.ru/catalogue/kuhonnye-garnitury/";
        });
    </script>
</head>
<body>
    <div class="message">
        <p>Переходим на страницу каталога...</p>
    </div>
</body>
</html>
